<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy Data Example</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
            background:#f5f5f5;
        }
        h1{
            color:#333;
        }
        table{
            border-collapse: collapse;
            width: 100%;
            background:white;
        }
        th, td{
            border:1px solid #ddd;
            padding:10px;
            text-align:left;
        }
        th{
            background:#4CAF50;
            color:white;
        }
        form{
            margin-top:30px;
            background:white;
            padding:20px;
            border-radius:5px;
        }
        input{
            padding:8px;
            margin:5px 0;
            width:100%;
        }
        button{
            padding:10px 15px;
            background:#4CAF50;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h1>Dummy User Data</h1>
<p>This page shows sample placeholder data.</p>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>City</th>
    </tr>
    <tr>
        <td>1</td>
        <td>John Doe</td>
        <td>john@example.com</td>
        <td>New York</td>
    </tr>
    <tr>
        <td>2</td>
        <td>Jane Smith</td>
        <td>jane@example.com</td>
        <td>London</td>
    </tr>
    <tr>
        <td>3</td>
        <td>Michael Lee</td>
        <td>michael@example.com</td>
        <td>Toronto</td>
    </tr>
</table>

<h2>Dummy Form</h2>

<form>
    <label>Name</label>
    <input type="text" placeholder="Enter your name">

    <label>Email</label>
    <input type="email" placeholder="Enter your email">

    <label>Password</label>
    <input type="password" placeholder="Enter password">

    <button type="submit">Submit</button>
</form>

</body>
</html>
